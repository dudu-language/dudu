name: Deploy Dudu website

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dudu-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Assemble static site
        run: |
          mkdir _site
          cp -R site/. _site/
          cp install.sh _site/install.sh
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          npx --yes wrangler@4.110.0 pages deploy _site
          --project-name dudu
          --branch master
