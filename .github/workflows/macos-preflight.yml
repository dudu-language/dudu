name: Apple Silicon release preflight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dudu-macos-portability-preflight
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    env:
      DUDU_SKIP_OPTIONAL_NATIVE: 1
      DUDU_TEST_ARCH: arm64
      LLVM_ROOT: /opt/homebrew/opt/llvm
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple Silicon
        run: test "$(uname -m)" = arm64
      - name: Install native prerequisites
        run: brew install cmake llvm pkg-config ripgrep
      - name: Configure portability tests
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDUDU_BUILD_TESTS=ON \
            -DDUDU_STRICT=ON \
            -DDUDU_WARN_AS_ERROR=ON
      - name: Build portability tests
        run: cmake --build build --parallel 4
      - name: Run release-script portability preflight
        run: ./scripts/test_examples_and_install.sh
