name: Apple Silicon release preflight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dudu-macos-portability-preflight
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    env:
      LLVM_ROOT: /opt/homebrew/opt/llvm
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple Silicon
        run: test "$(uname -m)" = arm64
      - name: Install native prerequisites
        run: brew install cmake llvm pkg-config ripgrep
      - name: Configure portability tests
        run: |
          cmake -S . -B build/macos-preflight \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUDU_BUILD_TESTS=ON \
            -DDUDU_STRICT=ON \
            -DDUDU_WARN_AS_ERROR=ON
      - name: Build portability tests
        run: |
          cmake --build build/macos-preflight --parallel --target \
            dudu_language_server_tests \
            dudu_language_server_navigation_tests \
            dudu_native_frontend_tests \
            dudu_native_type_compat_tests \
            dudu_emit_frontend_tests
      - name: Run portability tests
        run: |
          ctest --test-dir build/macos-preflight --output-on-failure \
            -R 'dudu_(language_server_tests|language_server_navigation_tests|native_frontend_tests|native_type_compat_tests|emit_frontend_tests)'
