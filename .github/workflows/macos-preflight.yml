name: Apple Silicon release preflight

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Validation scope
        required: true
        default: release
        type: choice
        options:
          - release
          - project-backends

permissions:
  contents: read

concurrency:
  group: dudu-macos-portability-preflight
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      DUDU_SKIP_OPTIONAL_NATIVE: 1
      DUDU_TEST_ARCH: arm64
      LLVM_ROOT: /opt/homebrew/opt/llvm
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple Silicon
        run: test "$(uname -m)" = arm64
      - name: Install native prerequisites
        run: brew install cmake llvm pkg-config ripgrep
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Run complete release portability preflight
        if: inputs.scope == 'release'
        run: ./scripts/release-check.sh
      - name: Build project-backend test tools
        if: inputs.scope == 'project-backends'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDUDU_BUILD_TESTS=ON \
            -DDUDU_STRICT=ON \
            -DDUDU_WARN_AS_ERROR=ON
          cmake --build build --parallel 4
      - name: Run project-backend integration tests
        if: inputs.scope == 'project-backends'
        run: ./scripts/test_project_backends.sh
