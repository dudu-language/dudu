name: Apple Silicon release preflight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dudu-macos-portability-preflight
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    env:
      DUDU_SKIP_OPTIONAL_NATIVE: 1
      DUDU_TEST_ARCH: arm64
      LLVM_ROOT: /opt/homebrew/opt/llvm
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple Silicon
        run: test "$(uname -m)" = arm64
      - name: Install native prerequisites
        run: brew install cmake llvm pkg-config ripgrep
      - name: Build compiler for test-runner portability probe
        run: ./scripts/build.sh
      - name: Run test-runner portability probe
        run: ./scripts/test_dudu_test_runner.sh
